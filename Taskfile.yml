version: '3'

tasks:
  check:
    desc: Run all spec validation checks
    cmds:
      - python scripts/validate_spec.py
    silent: false

  test:
    desc: Run validation tests
    cmds:
      - python -m pytest tests/ -v
    silent: false

  setup:
    desc: Install dependencies
    cmds:
      - pip install -r requirements.txt
    silent: false
