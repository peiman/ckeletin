version: '3'

vars:
  VENV_DIR: .venv
  PYTHON: '{{.VENV_DIR}}/bin/python'

tasks:
  setup:
    desc: Create virtual environment and install dependencies
    cmds:
      - python3 -m venv {{.VENV_DIR}}
      - '{{.PYTHON}} -m pip install -r requirements.txt --quiet'
    status:
      - test -f {{.VENV_DIR}}/bin/python
      - '{{.PYTHON}} -c "import yaml; import pytest"'

  check:
    desc: Run all spec validation checks
    deps: [setup]
    cmds:
      - '{{.PYTHON}} scripts/validate_spec.py'

  test:
    desc: Run validation tests
    deps: [setup]
    cmds:
      - '{{.PYTHON}} -m pytest tests/ -v'

  changelog:added:
    desc: "Add an Added entry (usage: task changelog:added -- 'description')"
    cmds:
      - changie changelog added "{{.CLI_ARGS}}"

  changelog:changed:
    desc: "Add a Changed entry (usage: task changelog:changed -- 'description')"
    cmds:
      - changie changelog changed "{{.CLI_ARGS}}"

  changelog:fixed:
    desc: "Add a Fixed entry (usage: task changelog:fixed -- 'description')"
    cmds:
      - changie changelog fixed "{{.CLI_ARGS}}"

  release:
    desc: "Bump version (usage: task release -- minor)"
    cmds:
      - changie bump {{.CLI_ARGS}}
