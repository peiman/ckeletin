# spec/_schema.yaml
# Defines the structure of ckeletin specification requirements.
# Each spec domain file (architecture.yaml, testing.yaml, etc.)
# follows this format.
#
# This is the authoritative definition — future validation tooling
# will be built from this file.

domain:
  description: "Top-level key in each spec file. Groups related requirements."
  fields:
    name:
      type: string
      required: true
      description: "Human-readable domain name"
    description:
      type: string
      required: true
      description: "What this domain covers and why it matters"

requirement:
  description: "A single spec requirement within a domain."
  fields:
    id:
      type: string
      required: true
      format: "CKSPEC-<DOMAIN>-<NNN>"
      description: >
        Stable identifier. Prefix indicates domain (ARCH, ENF, TEST,
        CMD, CFG, AGENT, DOC, UPD, LIC, CI, WF). Number is sequential
        within domain and NEVER reused — retired requirements keep
        their number.
      examples:
        - "CKSPEC-ARCH-001"
        - "CKSPEC-TEST-003"
    title:
      type: string
      required: true
      description: "Short descriptive title"
    level:
      type: enum
      required: true
      values: [MUST, SHOULD, MAY]
      description: >
        RFC 2119 conformance level. MUST = absolute requirement.
        SHOULD = valid reasons to deviate exist, but implications
        must be understood. MAY = truly optional.
    since:
      type: string
      required: true
      format: "vX.Y.Z"
      description: "Spec version when this requirement was introduced"
    modified:
      type: string
      required: false
      format: "vX.Y.Z"
      description: "Spec version when last changed (omit if never changed)"
    checkable:
      type: boolean
      required: true
      description: >
        Whether this requirement can be verified programmatically.
        checkable: true means the requirement CAN be checked by tooling;
        the enforcement_level in the conformance report captures HOW
        strongly it is verified in each implementation.
    description:
      type: string
      required: true
      description: >
        What the requirement demands. Uses RFC 2119 keywords in ALL
        CAPS. Language-agnostic — describes WHAT, never HOW.
    rationale:
      type: string
      required: true
      description: "WHY this requirement exists. Links to principles."
    notes:
      type: string
      required: false
      description: "Additional context, caveats, or implementation hints"

conformance_entry:
  description: "How an implementation reports conformance to a requirement."
  fields:
    status:
      type: enum
      required: true
      values: [met, partial, not-met, not-applicable, deferred]
      description: >
        met = fully satisfied. partial = partly satisfied (notes
        explain gap). not-met = not satisfied. not-applicable =
        doesn't apply to this implementation. deferred = planned.
    evidence:
      type: string
      required: true
      description: "Code reference, file path, or explanation showing HOW"
    tests:
      type: list[string]
      required: false
      description: "Test names or paths that verify this requirement"
    enforcement_level:
      type: enum
      required: false
      values: [compile-time, linter, sast, script, ci, honor-system]
      description: >
        Where on the enforcement ladder (CKSPEC-ENF-002) this
        requirement is verified. Implementations SHOULD report the
        strongest level that applies. Omit for non-checkable
        requirements reported via attestation.
    violation_test:
      type: string
      required: false
      description: >
        Path to a test that introduces a known violation and verifies
        the enforcement mechanism catches it. Preferred proof for
        enforcement claims above honor-system. Either violation_test
        or violation_evidence is required for claims above
        honor-system — without either, the enforcement level is
        unverified.
    violation_evidence:
      type: string
      required: false
      description: >
        For enforcement claims where a violation test file is not
        feasible (self-referential, destructive-to-test, structural,
        or tooling-enforced), an explanation referencing the specific
        file(s) that constitute the enforcement. Must include at
        least one file path. Accepted as alternative proof when
        violation_test is empty and enforcement_level is above
        honor-system.
    notes:
      type: string
      required: false
      description: "Caveats, partial conformance, or feedback for spec"

conformance_report:
  description: "Top-level structure of a conformance report."
  fields:
    implementation:
      type: string
      required: true
      description: "Name of the implementation (e.g., ckeletin-go)"
    spec_version:
      type: string
      required: true
      description: "Which spec version this report targets"
    report_date:
      type: string
      required: true
      format: "YYYY-MM-DD"
      description: "When this report was last updated"
    requirements:
      type: map[requirement_id -> conformance_entry]
      required: true
      description: "Per-requirement conformance status"
