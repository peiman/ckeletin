# spec/enforcement.yaml
# Enforcement requirements for ckeletin-conformant CLI projects.

domain:
  name: Enforcement
  description: >
    Every architectural decision that can be checked by a tool must be.
    Enforcement prevents silent erosion of standards over time.
    Undocumented gaps are invisible — documented gaps are trackable.

requirements:
  - id: CKSPEC-ENF-001
    title: Automated enforcement required
    level: MUST
    since: v0.1.0
    checkable: false
    description: >
      Every architectural decision that CAN be verified by a tool
      MUST have automated enforcement. Manual review alone is
      insufficient — tooling catches violations consistently,
      regardless of who wrote the code or when.
    rationale: >
      Automated Enforcement (Principle 2) is the keystone: rules
      without enforcement erode silently. New contributors may not
      read every decision document. Automation ensures decisions
      survive team changes, time pressure, and human error.
      Truth-Seeking (Principle 1) demands that compliance be
      verified, not assumed.
    notes: >
      This requirement is itself not fully automatable — determining
      whether a decision CAN be automated requires human judgment.
      The enforcement audit (CKSPEC-ENF-004) makes gaps visible.

  - id: CKSPEC-ENF-002
    title: Enforcement ladder
    level: SHOULD
    since: v0.1.0
    modified: v0.3.0
    checkable: false
    description: >
      Enforcement SHOULD use the strongest feasible mechanism. In
      order of preference: (1) compile-time / type system,
      (2) linter, (3) static analysis / SAST, (4) validator script,
      (5) CI-only check, (6) honor system (last resort). Higher
      levels catch violations earlier and cost less to maintain.
    rationale: >
      Automated Enforcement (Principle 2) prefers mechanisms that
      catch violations as early as possible. Compile-time enforcement
      is free — violations don't build. Linter enforcement catches
      issues in the editor. Script-based checks run at commit time.
      CI catches what slips through. Honor system relies entirely on
      human discipline and fails under time pressure. Lean Iteration
      (Principle 3) favors the mechanism with the shortest feedback
      loop.
    notes: >
      The achievable enforcement level for a given requirement varies
      by language. Rust's module visibility can enforce directed
      dependencies at compile time; Go requires a linter tool for the
      same guarantee. Language-native compile-time enforcement is the
      ideal — the ladder describes fallback levels when compile-time
      is not available. Conformance reports capture the actual
      enforcement level per requirement (see enforcement_level in
      the conformance schema), making cross-implementation differences
      visible.
  - id: CKSPEC-ENF-003
    title: Document enforcement gaps
    level: MUST
    since: v0.1.0
    checkable: true
    description: >
      Architectural decisions that cannot be fully automated MUST
      explicitly document: what IS automated (and by which tool),
      what remains honor system, and why automation is not feasible.
    rationale: >
      Truth-Seeking (Principle 1) requires that gaps be acknowledged,
      not hidden. Undocumented gaps are invisible — they cannot be
      revisited when new tooling becomes available. Documented gaps
      are trackable and create a natural backlog for enforcement
      improvement.
  - id: CKSPEC-ENF-004
    title: Enforcement audit table
    level: MUST
    since: v0.1.0
    checkable: true
    description: >
      Projects MUST maintain a living enforcement audit table that
      tracks every architectural decision, its enforcement mechanism,
      enforcement status (full / partial / honor system), and any
      gaps. This table is the single source of truth for enforcement
      coverage.
    rationale: >
      Truth-Seeking (Principle 1) demands visibility into what is
      enforced and what is not. An audit table makes enforcement
      coverage visible at a glance. It reveals patterns — many
      honor-system entries signal enforcement debt — and drives
      investment in automation where it matters most. Automated
      Enforcement (Principle 2) requires knowing where automation
      is missing before it can be added.

  - id: CKSPEC-ENF-005
    title: Conformance mapping completeness
    level: MUST
    since: v0.3.0
    checkable: true
    description: >
      Conformance report generators MUST validate that their mapping
      covers every requirement in the target spec version before
      producing a report. Unmapped requirements MUST cause the
      generator to fail, not produce a partial report silently.
      The machine-readable requirement ID list from the spec is the
      completeness anchor.
    rationale: >
      Truth-Seeking (Principle 1) demands that conformance reports
      account for every requirement — a report that omits requirements
      creates false confidence. Automated Enforcement (Principle 9)
      requires that completeness be machine-checked, not left to human
      diligence. A generator that silently skips requirements is worse
      than no generator, because its output is trusted.

  - id: CKSPEC-ENF-006
    title: Violation tests for enforcement claims
    level: MUST
    since: v0.3.0
    modified: v0.4.0
    checkable: true
    description: >
      Enforcement claims above honor-system in conformance reports
      MUST be accompanied by proof that the enforcement mechanism
      works. The preferred proof is a violation test — a test that
      introduces a known violation and verifies the enforcement
      mechanism catches it. When a violation test is not feasible
      (self-referential, destructive-to-test, structural, or
      tooling-enforced enforcement), a violation_evidence field
      referencing the specific file(s) that constitute the
      enforcement is an acceptable alternative. If neither a
      violation test nor violation evidence can be provided, the
      enforcement level MUST be reported as honor-system.
    rationale: >
      Truth-Seeking (Principle 1) requires evidence, not claims.
      Stating that a linter catches a violation without demonstrating
      it is an untested assertion. Curiosity Over Certainty
      (Principle 2) demands that we verify our assumptions about
      what our tools actually catch. A conformance report that says
      "met at linter level" without a violation test is a hypothesis,
      not a fact. However, some enforcement mechanisms are provably
      real without a test file — a Cargo.toml that omits a dependency
      makes reverse imports structurally impossible, a coverage script
      cannot be violation-tested without destroying the environment it
      protects. Requiring honor-system for these cases would be
      dishonest — the enforcement is stronger than honor-system, and
      the report should say so.
    notes: >
      Violation tests verify the enforcement mechanism, not the
      requirement itself. A violation test for CKSPEC-ARCH-002 does
      not test that dependencies flow correctly — it tests that
      introducing a reverse dependency is caught by the enforcement
      tool. This is meta-testing: testing the tests.

      Four categories of enforcement where violation tests are not
      feasible: (1) self-referential — the requirement is about the
      testing infrastructure itself, (2) destructive-to-test —
      creating a violation breaks the detection mechanism,
      (3) structural — the enforcement IS the architecture (build
      config, dependency graph), not a runtime check,
      (4) tooling-enforced — enforcement wraps the codebase from
      outside (CI, hooks, toolchain). Discovered independently by
      both ckeletin-go and ckeletin-rust during conformance
      reporting. See: Principle 10 (Feedback Cycle).

  - id: CKSPEC-ENF-007
    title: Automatic feedback signals
    level: SHOULD
    since: v0.3.0
    checkable: true
    description: >
      Conformance report generators SHOULD automatically include
      feedback signals when: (1) a checkable requirement has no
      automated check, (2) the enforcement level is lower than the
      spec's preferred level (per CKSPEC-ENF-002), or (3) a
      violation test is missing for a claimed enforcement level.
      These signals SHOULD be included in the report without human
      intervention, closing the feedback cycle structurally.
    rationale: >
      Feedback Cycle (Principle 10) requires that implementations
      feed learnings back to the spec. If feedback depends on someone
      remembering to write it down, it won't survive time pressure
      (Principle 9). Automatic feedback signals ensure the cycle
      closes itself — every conformance report is also a feedback
      report.
