  # ---------------------------------------------------------------------------
  # Output (CKSPEC-OUT-001 through CKSPEC-OUT-005)
  # Evidence from ADR-013, validate-output-patterns.sh, renderer.go, json.go
  # ---------------------------------------------------------------------------

  CKSPEC-OUT-001:
    status: met
    evidence: >
      ADR-013 defines the 3-stream model: Data to stdout (user output
      via internal/ui), Status to stderr (zerolog console output),
      Audit to log file (zerolog JSON file output). Logger configured
      to write console to stderr, file to JSON.
    tests: ["task validate:output"]

  CKSPEC-OUT-002:
    status: met
    evidence: >
      --output json flag supported on all commands. Implemented via
      output.IsJSONMode() check in internal/ui/renderer.go. When
      active, RenderSuccess emits JSONEnvelope to stdout. Stderr
      logging disabled in JSON mode.
    tests: []

  CKSPEC-OUT-003:
    status: met
    evidence: >
      Standard envelope in .ckeletin/pkg/output/json.go: JSONEnvelope
      struct with Status, Command, Data, Error fields. JSONResponder
      interface allows commands to customize Data payload shape.
      RenderJSON marshals envelope to writer.
    tests: []

  CKSPEC-OUT-004:
    status: met
    evidence: >
      internal/ui/renderer.go RenderSuccess performs shadow logging:
      log.Debug() with "data" interface field writes raw struct to
      audit log file, while formatted text goes to stdout. Both happen
      in the same function call. Audit stream always active. Debug
      level ensures shadow logs reach the file logger (default: debug)
      without polluting the console (default: info).
    tests: []

  CKSPEC-OUT-005:
    status: met
    evidence: >
      validate-output-patterns.sh detects fmt.Print* and os.Stdout
      usage in internal/* (excluding internal/ui/ and tests). Business
      logic must use internal/ui for Data stream and internal/logger
      for Status stream. Enforced via task check.
    tests: ["task validate:output"]

