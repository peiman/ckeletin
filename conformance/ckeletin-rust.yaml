# conformance/ckeletin-rust.yaml
# Conformance report for ckeletin-rust (workhorse) against the ckeletin spec.
#
# Updated after migration to .ckeletin/ framework model. Clean crate names
# (domain, infrastructure, cli). Framework code in .ckeletin/crate/.
# 140 tests, 97% coverage, 32/35 met.

implementation: ckeletin-rust
spec_version: "0.4.0"
report_date: "2026-04-18"

requirements:
  # ---------------------------------------------------------------------------
  # Architecture (CKSPEC-ARCH-001 through CKSPEC-ARCH-007)
  # ---------------------------------------------------------------------------

  CKSPEC-ARCH-001:
    status: met
    enforcement_level: compile-time
    evidence: >
      Cargo workspace with 3 project crates (domain, infrastructure, cli)
      plus framework crate (.ckeletin/crate, name = "ckeletin") and
      conformance tool (.ckeletin/conform). Domain depends only on serde.
      Infrastructure depends on ckeletin. CLI converges both.
    violation_evidence: >
      Structural enforcement via Cargo workspace dependency graph.
      File: crates/domain/Cargo.toml — depends only on serde.
      File: crates/infrastructure/Cargo.toml — depends on ckeletin, not domain/cli.
      Individual import violations tested via trybuild:
      crates/domain/tests/violations/domain_imports_infrastructure.rs.
    tests:
      - "cargo test -p domain architecture_violations"

  CKSPEC-ARCH-002:
    status: met
    enforcement_level: compile-time
    evidence: >
      Domain depends only on serde. Infrastructure depends on ckeletin
      (framework) — no domain or cli deps. CLI depends on both domain
      and infrastructure (convergence point). Reverse imports are
      compile errors.
    violation_test: "crates/domain/tests/violations/domain_imports_infrastructure.rs"
    tests:
      - "cargo test -p domain architecture_violations"
      - "cargo test -p infrastructure architecture_violations"

  CKSPEC-ARCH-003:
    status: met
    enforcement_level: compile-time
    evidence: >
      Only crates/cli/Cargo.toml lists clap. Domain and infrastructure
      cannot import it — compile error.
    violation_test: "crates/domain/tests/violations/domain_imports_clap.rs"
    tests:
      - "cargo test -p domain architecture_violations"
      - "cargo test -p infrastructure architecture_violations"

  CKSPEC-ARCH-004:
    status: met
    enforcement_level: compile-time
    evidence: >
      Domain crate depends only on serde. Cannot import infrastructure,
      ckeletin, clap, figment, or tracing — each has a violation test.
    violation_test: "crates/domain/tests/violations/domain_imports_ckeletin.rs"
    tests:
      - "cargo test -p domain architecture_violations"
    notes: >
      5 violation tests for domain: clap, figment, tracing,
      infrastructure, ckeletin. The ckeletin test prevents domain
      from bypassing the infrastructure re-export layer.

  CKSPEC-ARCH-005:
    status: met
    enforcement_level: compile-time
    evidence: >
      Infrastructure Cargo.toml has no dependency on domain or cli.
      Depends on ckeletin (framework) which is infrastructure-level.
    violation_test: "crates/infrastructure/tests/violations/infra_imports_domain.rs"
    tests:
      - "cargo test -p infrastructure architecture_violations"

  CKSPEC-ARCH-006:
    status: met
    evidence: >
      crates/cli/src/main.rs is bootstrap only — arg parsing, config
      loading, logging init, command dispatch. All logic lives in
      domain and infrastructure crates.
    violation_evidence: >
      Structural: only crates/cli/Cargo.toml has a [[bin]] target.
      Domain and infrastructure crates are library-only.
      File: crates/cli/Cargo.toml lines 7-9.

  CKSPEC-ARCH-007:
    status: met
    enforcement_level: compile-time
    evidence: >
      All source in designated crate directories. Framework code in
      .ckeletin/crate/. Workspace structure enforces location.
    violation_evidence: >
      Structural enforcement via Cargo crate configuration.
      File: crates/cli/Cargo.toml — only [[bin]] target.
      File: crates/domain/Cargo.toml — no [[bin]] section.
      File: crates/infrastructure/Cargo.toml — no [[bin]] section.

  # ---------------------------------------------------------------------------
  # Enforcement (CKSPEC-ENF-001 through CKSPEC-ENF-007)
  # ---------------------------------------------------------------------------

  CKSPEC-ENF-001:
    status: met
    evidence: >
      Justfile gateway: just check runs ckeletin-check (fmt, clippy,
      deny), test (full workspace), and ckeletin-health. Pre-commit
      hooks via lefthook. 7 trybuild compile-fail tests for architecture.
      Framework purity tests prevent hardcoded values in .ckeletin/.

  CKSPEC-ENF-002:
    status: met
    evidence: >
      Enforcement ladder used: compile-time (7 architecture violation
      tests), script/CI (output tests, coverage, conformance generator),
      honor-system (TDD intent, atomic commits). Framework purity tests
      are invariant tests — verify properties of the codebase itself.

  CKSPEC-ENF-003:
    status: partial
    evidence: >
      Enforcement gaps documented in conformance-mapping.toml with
      enforcement_level per requirement. Honor-system entries explicitly
      marked. No standalone human-readable audit table yet.

  CKSPEC-ENF-004:
    status: partial
    evidence: >
      conformance-mapping.toml tracks all 35 requirements with status,
      enforcement_level, evidence, checks, violation_tests, and
      violation_evidence. Machine-readable but not a human-readable
      audit table document.

  CKSPEC-ENF-005:
    status: met
    enforcement_level: script
    evidence: >
      Conformance generator (.ckeletin/conform) fetches requirements.json
      from the spec repo at runtime. Falls back to cached copy offline.
      Validates all requirement IDs are mapped before reporting.
    tests:
      - "just conform"

  CKSPEC-ENF-006:
    status: partial
    enforcement_level: script
    evidence: >
      7 trybuild violation tests for compile-time claims (5 domain +
      2 infrastructure). 3 violation_evidence entries for structural
      claims (ARCH-001, ARCH-006, ARCH-007). Output and enforcement
      requirements above honor-system still need violation tests or
      evidence. 2 framework purity tests verify no project-specific
      strings leak into .ckeletin/.
    tests:
      - "cargo test -p domain architecture_violations"
      - "cargo test -p infrastructure architecture_violations"
      - "cargo test -p ckeletin --test framework_purity"

  CKSPEC-ENF-007:
    status: met
    enforcement_level: script
    evidence: >
      Conformance generator automatically reports feedback signals
      when enforcement claims above honor-system lack violation tests
      or evidence. 13 feedback signals currently reported.
    tests:
      - "just conform"

  # ---------------------------------------------------------------------------
  # Testing (CKSPEC-TEST-001 through CKSPEC-TEST-004)
  # ---------------------------------------------------------------------------

  CKSPEC-TEST-001:
    status: met
    evidence: >
      TDD enforced via CLAUDE.md and AGENTS.md. The diagnose command
      was built test-first: 29 domain tests, 22 infrastructure tests,
      11 CLI integration tests — all written before implementation.

  CKSPEC-TEST-002:
    status: met
    enforcement_level: script
    evidence: >
      just coverage runs cargo llvm-cov --workspace --fail-under-lines 85.
      Current: 97% line coverage (140 tests across all crates).
    tests:
      - "just coverage"

  CKSPEC-TEST-003:
    status: met
    evidence: >
      Writer injection pattern in Output struct (&mut dyn Write).
      No mock frameworks in Cargo.toml or Cargo.lock. Test doubles
      are hand-written (Vec<u8> as Write, tempfile for filesystem).

  CKSPEC-TEST-004:
    status: met
    evidence: >
      Enforced via CLAUDE.md and AGENTS.md. Tests and implementation
      committed together as atomic units.

  # ---------------------------------------------------------------------------
  # Output (CKSPEC-OUT-001 through CKSPEC-OUT-005)
  # ---------------------------------------------------------------------------

  CKSPEC-OUT-001:
    status: met
    evidence: >
      Three streams in .ckeletin/crate/src/output.rs: Data to stdout
      (human Display or JSON envelope), Status to stderr (tracing
      console subscriber), Audit to log file (tracing JSON file).
    tests:
      - "cargo test -p ckeletin --lib output"

  CKSPEC-OUT-002:
    status: met
    enforcement_level: script
    evidence: >
      --output json flag on all commands. Integration tests verify
      JSON envelope on stdout and empty stderr. Covers ping, status,
      diagnose in both human and JSON modes.
    tests:
      - "cargo test -p cli --test cli"

  CKSPEC-OUT-003:
    status: met
    enforcement_level: script
    evidence: >
      Envelope struct in .ckeletin/crate/src/output.rs: status
      (success/error), command, data, error. Roundtrip test verifies
      JSON stability.
    tests:
      - "cargo test -p ckeletin --lib output"

  CKSPEC-OUT-004:
    status: met
    evidence: >
      tracing::debug! calls in Output::success() and Output::error()
      in .ckeletin/crate/src/output.rs. Shadow logs land in file
      appender. Console suppressed in JSON mode.
    tests:
      - "cargo test -p ckeletin --lib output"

  CKSPEC-OUT-005:
    status: met
    enforcement_level: compile-time
    evidence: >
      Domain crate has no std::io dependency and no ckeletin dependency.
      Cannot write to stdout or access Output struct directly.
    violation_test: "crates/domain/tests/violations/domain_imports_ckeletin.rs"
    tests:
      - "cargo test -p domain architecture_violations"

  # ---------------------------------------------------------------------------
  # Agent Readiness (CKSPEC-AGENT-001 through CKSPEC-AGENT-005)
  # ---------------------------------------------------------------------------

  CKSPEC-AGENT-001:
    status: met
    evidence: >
      AGENTS.md exists with: project purpose, architecture diagram,
      crate responsibilities, commands, task runner recipes, coding
      conventions, testing strategy, conformance info, known constraints.

  CKSPEC-AGENT-002:
    status: met
    evidence: >
      AGENTS.md contains no Claude-specific, Gemini-specific, or
      Copilot-specific instructions. All provider-specific content
      is in CLAUDE.md.

  CKSPEC-AGENT-003:
    status: met
    evidence: >
      CLAUDE.md exists with provider-specific instructions including
      VaultMind integration, scientific approach, agent signal protocol,
      and known failure modes. References AGENTS.md for universal guide.

  CKSPEC-AGENT-004:
    status: met
    evidence: >
      AGENTS.md covers: purpose, architecture (with crate diagram),
      all commands with usage, task runner recipes, coding conventions,
      testing strategy (140 tests, violation tests, purity tests),
      conformance, known constraints.

  CKSPEC-AGENT-005:
    status: met
    evidence: >
      CLI is the primary interface. --output json provides machine-readable
      responses. All operations via workhorse binary or just commands.
      No MCP or protocol layer required.
    tests:
      - "cargo test -p cli --test cli"

  # ---------------------------------------------------------------------------
  # Changelog (CKSPEC-CL-001 through CKSPEC-CL-007)
  # ---------------------------------------------------------------------------

  CKSPEC-CL-001:
    status: met
    evidence: >
      CHANGELOG.md exists at repository root.

  CKSPEC-CL-002:
    status: met
    evidence: >
      CHANGELOG.md follows Keep a Changelog format with Added, Changed,
      Fixed sections. Versions in reverse chronological order.

  CKSPEC-CL-003:
    status: met
    evidence: >
      Dates use YYYY-MM-DD format. Example: [0.1.0] - 2026-04-13.

  CKSPEC-CL-004:
    status: met
    evidence: >
      CHANGELOG.md states adherence to Semantic Versioning. Cargo.toml
      workspace version is 0.1.0 (SemVer format).

  CKSPEC-CL-005:
    status: met
    evidence: >
      [Unreleased] section at top of CHANGELOG.md with Added, Changed,
      Fixed categories for in-progress work.

  CKSPEC-CL-006:
    status: met
    evidence: >
      Entries are human-written, describing features at user-relevant
      granularity. Not a git log dump.

  CKSPEC-CL-007:
    status: met
    evidence: >
      Comparison link at bottom: Unreleased → compare/v0.1.0...HEAD.
